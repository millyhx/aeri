<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Calm Night</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Welcome modal -->

<div id="modal">

    <div id="modalContent">

        <h2>Take a moment ✨</h2>

        <p>

        If you're going through something,
        give yourself a couple of minutes.

        This isn't really a game.

        Just take your mind somewhere else
        for a little while.

        </p>

        <button id="beginBtn">
            Begin
        </button>

    </div>

</div>


<div id="scene">

    <div id="sky"></div>

    <!-- Window -->

    <div id="windowContainer">

        <img
        src="window.png"
        id="windowFrame"
        >

        <canvas id="mist"></canvas>

    </div>

    <div id="moon"></div>

    <button id="dreamBtn">
        Dream
    </button>

    <div id="message">
        Clear the mist from the window
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
