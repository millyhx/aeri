<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Calm Night</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- =========================
         WELCOME MODAL
    ========================== -->

    <div id="modal">

        <div id="modalContent">

            <h2>Take a moment ✨</h2>

            <p>
                If you're going through something,
                give yourself a couple of minutes.

                This isn't really a game.

                Just take your mind somewhere else
                for a little while.
            </p>

            <button id="beginBtn">
                Begin
            </button>

        </div>

    </div>

    <!-- =========================
         MAIN SCENE
    ========================== -->

    <div id="scene">

        <div id="sky"></div>

        <!-- =========================
             WINDOW + MIST
        ========================== -->

        <div id="windowContainer">

            <div id="windowFrame"></div>

            <canvas id="mist"></canvas>

        </div>

        <!-- =========================
             MOON / SUN
        ========================== -->

        <div id="moon"></div>

        <!-- =========================
             DREAM BUTTON
        ========================== -->

        <button id="dreamBtn">
            Dream
        </button>

        <!-- =========================
             MESSAGE
        ========================== -->

        <div id="message">
            Clear the mist from the window
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
